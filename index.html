<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JobConnect</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f7f7f7;
}

header{
background:#0F2B5B;
padding:20px;
color:white;
text-align:center;
}

.hero{
padding:60px 20px;
text-align:center;
}

.hero h1{

font-size:40px;

color:#0F2B5B;

}

button{

padding:15px 30px;

font-size:18px;

margin:10px;

border:none;

border-radius:10px;

cursor:pointer;

}

.orange{

background:#ff6600;

color:white;

}

.blue{

background:#0F2B5B;

color:white;

}

.service{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

padding:20px;

}

.card{

background:white;

padding:20px;

border-radius:15px;

text-align:center;

box-shadow:0 0 10px rgba(0,0,0,.1);

}

footer{

padding:30px;

text-align:center;

background:#0F2B5B;

color:white;

}

</style>

</head>

<body>

<header>

<h2>JobConnect</h2>

<p>หาช่างง่าย ได้งานไว ไว้ใจได้</p>

</header>

<section class="hero">

<h1>หาช่างทั่วประเทศไทย</h1>

<p>

รวมช่างทุกสายงาน

</p>

<button class="orange">

หาคนงาน

</button>

<button class="blue">

สมัครเป็นช่าง

</button>

</section>

<section class="service">

<div class="card">

ช่างก่อสร้าง

</div>

<div class="card">

ช่างไฟ

</div>

<div class="card">

ช่างประปา

</div>

<div class="card">

ช่างเชื่อม

</div>

<div class="card">

ช่างแอร์

</div>

<div class="card">

แรงงานทั่วไป

</div>

</section>

<footer>

JobConnect 2026

</footer>

</body>

</html>
